<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Transnet | WeatherWatch — Sishen–Saldanha Corridor</title>
<link rel="stylesheet" href="assets/app.css">
<script src="assets/weather-loops.js"></script>
</head>
<body>

<div class="appbar">
  <div class="mark">
    <img class="tnlogo" src="assets/transnet-logo.png" alt="Transnet">
    <div class="wordmark">
      <h1>Weather <b>Watch</b></h1>
    </div>
    <span class="sub">SISHEN–SALDANHA · LIVE CORRIDOR WEATHER RISK</span>
  </div>
  <div class="spacer"></div>
</div>

<nav class="tabs" id="tabs">
  <a href="index.html">Overview</a>
  <a href="index.html#drill">Drill-down</a>
  <a href="index.html#charts">Charts</a>
  <a href="index.html#photos">Photos</a>
  <a href="weather.html" class="active">Weather</a>
  <a href="index.html#setup">Setup</a>
</nav>

<main>
  <div id="weatherRoot"></div>
</main>

<footer id="foot">WeatherWatch corridor forecast · per-loop risk for the Sishen–Saldanha ore line, Langberg (L19) to Saldanha Bay · part of the Ore Line Shutdown reporting suite.</footer>

<script>
"use strict";
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const FORECAST_DAYS = 10; // mirrors the shutdown possession window on the main report

/* WX_LOOPS, wxRiskLevel, RISK_RANK, RISK_LABEL, fetchLoopForecast come from
   assets/weather-loops.js (shared with index.html for KPI weather-risk linking). */

function renderWxTable(loopResults, dates, days){
  const dayHead1 = dates.map((t,i)=>{
    const dt=new Date(t+'T00:00:00');
    const tag = i<15 ? 'IFS' : 'EC46';
    return `<th colspan="3" class="daygrp daystart daylabel">${dt.toLocaleDateString('en-ZA',{weekday:'short',day:'2-digit',month:'short'})} <span style="opacity:.6">${tag}</span></th>`;
  }).join('');
  const dayHead2 = dates.map(()=>`<th class="daygrp daystart metric-mm">mm</th><th class="metric-wind">km/h</th><th class="metric-temp">°C range</th>`).join('');
  const bodyRows = loopResults.map(res=>{
    const l=res.loop;
    if(!res.rows){
      return `<tr><td class="loopcell">${l.loop!=null?'L'+l.loop+' ':''}${esc(l.name)}</td>${dates.map(()=>`<td class="daycell daystart">—</td><td class="daycell">—</td><td class="daycell">—</td>`).join('')}<td class="riskcell"><span class="badge b-grey">no data</span></td></tr>`;
    }
    let worst='low';
    const cells=res.rows.map(r=>{
      if(RISK_RANK[r.level]>RISK_RANK[worst]) worst=r.level;
      const cls = r.level==='high'?'red':(r.level==='medium'?'amber':'');
      return `<td class="daycell daystart metric-mm ${cls}">${r.rain}</td><td class="daycell metric-wind ${cls}">${r.wind}</td><td class="daycell metric-temp ${cls}">${r.tmin}–${r.tmax}°</td>`;
    }).join('');
    const riskBadge = worst==='high'?'b-bad':(worst==='medium'?'b-warn':'b-grey');
    const loopRiskCls = worst==='high'?'risk-high':(worst==='medium'?'risk-medium':'');
    return `<tr><td class="loopcell ${loopRiskCls}">${l.loop!=null?'L'+l.loop+' ':''}${esc(l.name)}</td>${cells}<td class="riskcell"><span class="badge ${riskBadge}">${RISK_LABEL[worst]}</span></td></tr>`;
  }).join('');
  return `<div class="wxtblwrap"><table class="wx">
    <thead><tr><th class="loopcell" rowspan="2">Loop</th>${dayHead1}<th rowspan="2">Risk</th></tr><tr>${dayHead2}</tr></thead>
    <tbody>${bodyRows}</tbody>
  </table></div>`;
}

async function renderWeather(){
  const el=$('#weatherRoot');
  const days=Math.min(Math.max(FORECAST_DAYS,1),16);
  el.innerHTML=`
    <div class="wxlegend">
      <b>Sources</b> — IFS HRES ECMWF 9 km (days 1–15) · EC46 ~ ECMWF ensemble mean, 36 km, indicative · ERA5 actual observed (via Open-Meteo)
      <span class="sep">|</span>
      <span class="lg-amber">Amber</span> = medium risk (wind 25–40 km/h · precip 4–10 mm/day · temp &lt;5°C or &gt;35°C)
      <span class="sep">|</span>
      <span class="lg-red">Red</span> = high risk (wind &gt;40 km/h · precip &gt;10 mm/day · temp &lt;0°C or &gt;40°C)
      <span class="sep">|</span>
      The left edge of each loop's row is coloured when that loop has an amber/red day in the window.
    </div>
    <div class="card">
      <h2>Weather Watch — ${days}-day corridor forecast <span class="hint">Sishen → Saldanha Bay · per loop, per day</span></h2>
      <div id="wxTableWrap" class="note">Loading forecast for ${WX_LOOPS.length} loops…</div>
    </div>`;

  const settled = await Promise.allSettled(WX_LOOPS.map(l=>fetchLoopForecast(l, days)));
  const loopResults = settled.map((s,i)=> s.status==='fulfilled'? s.value : {loop:WX_LOOPS[i], rows:null});
  const ok = loopResults.filter(r=>r.rows);

  if(!ok.length){
    $('#wxTableWrap').innerHTML = `<div class="note">Live forecast unavailable in this environment. When hosted, this table pulls a ${days}-day Open-Meteo forecast (precipitation, max wind speed, temperature range) for each of the ${WX_LOOPS.length} loops between Sishen and Saldanha Bay, risk-flagged per the legend above.</div>`;
    return;
  }
  $('#wxTableWrap').innerHTML = renderWxTable(loopResults, ok[0].dates, days);
}

renderWeather();

/* Tabs' sticky offset must match the appbar's *actual* rendered height —
   it can wrap on narrow screens, so a hardcoded px value would leave the
   tabs bar stuck underneath/behind it instead of right below it. */
function syncAppbarHeight(){
  const bar = document.querySelector('.appbar'); if(!bar) return;
  document.documentElement.style.setProperty('--appbar-h', bar.offsetHeight+'px');
}
syncAppbarHeight();
window.addEventListener('resize', ()=>{
  clearTimeout(window.__appbarResizeT);
  window.__appbarResizeT = setTimeout(syncAppbarHeight, 120);
});
</script>
</body>
</html>
