<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Transnet | Ore Line Shutdown — October 2026 Daily Reporting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="assets/app.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div class="appbar">
  <div class="mark">
    <img class="tnlogo" src="assets/transnet-logo.png" alt="Transnet">
    <div class="wordmark">
      <h1>Ore Line <b>Shutdown</b></h1>
    </div>
    <span class="sub" id="subTitle">SISHEN–SALDANHA · OCT 2026 · 10-DAY POSSESSION</span>
  </div>
  <div class="spacer"></div>
  <span class="rolechip" id="roleChip">View only</span>
  <span id="authArea"></span>
  <button class="btn-ghost" id="btnExport">Export</button>
</div>

<div class="modal-backdrop" id="loginBackdrop" style="display:none">
  <div class="modal card" id="loginModal">
    <h2>Sign in</h2>
    <div class="frow">
      <label>Email<input type="email" id="loginEmail" autocomplete="username"></label>
      <label>Password<input type="password" id="loginPassword" autocomplete="current-password"></label>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn" id="btnDoLogin">Sign in</button>
      <button class="btn sec" id="btnCancelLogin">Cancel</button>
    </div>
    <div class="note" id="loginError" style="color:var(--bad);margin-top:8px"></div>
  </div>
</div>

<div class="daystrip-wrap">
  <div class="daystrip-label"><span>DAILY EXECUTION — tap a day to report against it</span><span id="dayContext"></span></div>
  <div class="daystrip" id="daystrip" role="tablist" aria-label="Shutdown days"></div>
</div>

<nav class="tabs" id="tabs">
  <button data-tab="overview" class="active">Overview</button>
  <button data-tab="drill">Drill-down</button>
  <button data-tab="charts">Charts</button>
  <button data-tab="photos">Photos</button>
  <a href="weather.html">Weather</a>
  <button data-tab="setup">Setup</button>
</nav>

<main>
  <div class="offline-note" id="offlineNote"></div>
  <section id="tab-overview"></section>
  <section id="tab-drill" style="display:none"></section>
  <section id="tab-charts" style="display:none">
    <div class="card">
      <h2>Performance charts <span class="hint">build any view — selections are saved with the report</span></h2>
      <div class="chartctl">
        <label>Scope<select id="cScope"></select></label>
        <label>Series<select id="cSeries">
          <option value="cum">Cumulative — plan vs actual (S-curve)</option>
          <option value="daily">Daily — target vs actual (bars)</option>
          <option value="var">Daily variance</option>
        </select></label>
        <label>Compare<select id="cCompare"><option value="">— none —</option></select></label>
      </div>
      <div class="chartbox"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="card">
      <h2>Division progress by day</h2>
      <div class="chartbox"><canvas id="divChart"></canvas></div>
    </div>
  </section>
  <section id="tab-photos" style="display:none"></section>
  <section id="tab-setup" style="display:none"></section>
</main>

<footer id="foot"></footer>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   ORE LINE SHUTDOWN REPORTER — Part A: state, permissions, rendering
   ===================================================================== */
"use strict";

/* ---------- Roles & access ---------- */
const ROLES = [
  {id:'admin', name:'Programme Admin (PMO)', edit:['TRIM','TE','TPT'], setup:true},
  {id:'trim',  name:'TRIM Editor',           edit:['TRIM'], setup:false},
  {id:'te',    name:'TE Editor',             edit:['TE'],   setup:false},
  {id:'tpt',   name:'TPT Editor',            edit:['TPT'],  setup:false},
  {id:'exec',  name:'Transnet Line Management — view', edit:[], setup:false},
  {id:'cust',  name:'Mine Customer — view',  edit:[], setup:false},
];
const DEV_CATS = ['Material availability','On-track machine breakdown','Plant / equipment breakdown','Weather','Security / theft & vandalism','Possession / access','Labour availability','Design or scope change','Logistics / delivery','Other'];

/* ---------- Helpers ---------- */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'k' + Math.random().toString(36).slice(2,9);
const sum = a => a.reduce((x,y)=>x+(+y||0),0);
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',2600); }
function dayDate(i){ const d=new Date(state.meta.startDate+'T00:00:00'); d.setDate(d.getDate()+i); return d; }
function fmtDay(i){ return dayDate(i).toLocaleDateString('en-ZA',{day:'2-digit',month:'short'}); }
function fmtDow(i){ return dayDate(i).toLocaleDateString('en-ZA',{weekday:'short'}); }

/* ---------- Supabase backend ---------- */
/* Replace these two with your project's values (Project Settings > API),
   then run supabase/schema.sql once in the SQL Editor. See supabase/README.md. */
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const supabaseConfigured = /^https:\/\//.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 20;
const sb = (supabaseConfigured && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

/* ---------- State ---------- */
let state = { meta:{ name:'', corridor:'', startDate:'2026-01-01', days:10, demo:false }, charts:{ scope:'ALL', series:'cum', compare:'' }, divisions:[] };
let role = ROLES.find(r=>r.id==='cust');
let currentUser = null, currentProfile = null;
let selectedDay = 0;
const ui = { openDiv:new Set(['TRIM']), openDisc:new Set(), openKpi:new Set(), photoDiv:'', photoDay:'' };

function roleFromProfile(profile){
  return ROLES.find(r=>r.id===profile?.role) || ROLES.find(r=>r.id==='cust');
}
async function refreshAuth(){
  if(!sb) return;
  const { data:{ user } } = await sb.auth.getUser();
  currentUser = user || null;
  if(currentUser){
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = data || null;
  } else currentProfile = null;
  role = roleFromProfile(currentProfile);
}

/* ---------- Fetch shared state from Supabase ---------- */
async function fetchState(){
  const [{data:meta,error:e1}, {data:divisions,error:e2}, {data:disciplines,error:e3},
         {data:kpis,error:e4}, {data:actuals,error:e5}, {data:deviations,error:e6}, {data:photos,error:e7}] = await Promise.all([
    sb.from('report_meta').select('*').eq('id',1).single(),
    sb.from('divisions').select('*').order('sort_order'),
    sb.from('disciplines').select('*').order('sort_order'),
    sb.from('kpis').select('*').order('sort_order'),
    sb.from('kpi_actuals').select('*'),
    sb.from('kpi_deviations').select('*'),
    sb.from('kpi_photos').select('*').order('created_at'),
  ]);
  const firstError = e1||e2||e3||e4||e5||e6||e7;
  if(firstError) throw firstError;

  const actualsByKpi={}; (actuals||[]).forEach(a=>{ (actualsByKpi[a.kpi_id] ||= {})[a.day]=a.value; });
  const devByKpi={}; (deviations||[]).forEach(d=>{ (devByKpi[d.kpi_id] ||= {})[d.day]={cat:d.category, reason:d.reason}; });
  const photosByKpi={}; (photos||[]).forEach(p=>{
    const { data:pub } = sb.storage.from('kpi-photos').getPublicUrl(p.storage_path);
    (photosByKpi[p.kpi_id] ||= []).push({ id:p.id, day:p.day, dataUrl:pub.publicUrl, lat:p.lat, lon:p.lon, caption:p.caption, ts:p.created_at, gpsSource:p.gps_source });
  });

  const days = meta.days;
  const kpisByDisc={};
  (kpis||[]).forEach(k=>{
    const targets=(k.targets||[]).slice(0,days); while(targets.length<days) targets.push(0);
    const actualsArr=Array.from({length:days},(_,d)=>{ const v=(actualsByKpi[k.id]||{})[d]; return v===undefined?null:v; });
    (kpisByDisc[k.discipline_id] ||= []).push({ id:k.id, name:k.name, workType:k.work_type, unit:k.unit, targets, actuals:actualsArr, dev:devByKpi[k.id]||{}, photos:photosByKpi[k.id]||[] });
  });
  const discByDiv={};
  (disciplines||[]).forEach(dc=>{ (discByDiv[dc.division_id] ||= []).push({ id:dc.id, name:dc.name, kpis:kpisByDisc[dc.id]||[] }); });
  const divisionsOut=(divisions||[]).map(dv=>({ id:dv.id, name:dv.name, color:dv.color, disciplines:discByDiv[dv.id]||[] }));

  return {
    meta:{ name:meta.name, corridor:meta.corridor, startDate:meta.start_date, days:meta.days, demo:meta.demo },
    charts: state.charts || { scope:'ALL', series:'cum', compare:'' },
    divisions: divisionsOut,
  };
}

/* ---------- Permissions ---------- */
const canEdit = divId => role.edit.includes(divId);
const isAdmin = () => !!role.setup;

/* ---------- Calculations ---------- */
function allKpis(filterDiv, filterDisc){
  const out=[];
  state.divisions.forEach(dv=>{
    if(filterDiv && dv.id!==filterDiv) return;
    dv.disciplines.forEach(dc=>{
      if(filterDisc && dc.id!==filterDisc) return;
      dc.kpis.forEach(k=>out.push({div:dv, disc:dc, kpi:k}));
    });
  });
  return out;
}
const cumT = (k,d)=> sum(k.targets.slice(0,d+1));
const cumA = (k,d)=> sum(k.actuals.slice(0,d+1).map(v=>v==null?0:v));
const totT = k => sum(k.targets);
function lastReportedDay(){
  let last=-1;
  allKpis().forEach(({kpi})=>kpi.actuals.forEach((v,i)=>{ if(v!=null && i>last) last=i; }));
  return last;
}
/* progress fractions (0..1) averaged across KPIs in scope */
function scopeCurves(items){
  const plan=[], act=[];
  for(let d=0; d<state.meta.days; d++){
    let p=0,a=0,n=0;
    items.forEach(({kpi})=>{ const t=totT(kpi); if(!t) return; n++; p+=cumT(kpi,d)/t; a+=cumA(kpi,d)/t; });
    plan.push(n? p/n*100 : 0); act.push(n? a/n*100 : 0);
  }
  return {plan, act};
}
function dailyAttainment(items, d){
  let a=0,n=0;
  items.forEach(({kpi})=>{
    const t=kpi.targets[d], v=kpi.actuals[d];
    if(t>0 && v!=null){ a+=Math.min(v/t,1.25); n++; }
  });
  return n? a/n*100 : null;
}
function kpiStatus(k, d){ // vs plan to date
  const t=cumT(k,d); if(!t) return 'grey';
  const r=cumA(k,d)/t;
  return r>=0.98?'good':(r>=0.9?'warn':'bad');
}
function deviationList(dayOnly){
  const out=[];
  allKpis().forEach(({div,disc,kpi})=>{
    Object.entries(kpi.dev||{}).forEach(([d,dev])=>{
      d=+d;
      if(dayOnly!=null && d!==dayOnly) return;
      out.push({day:d, div, disc, kpi, dev});
    });
  });
  return out.sort((a,b)=>a.day-b.day);
}
function allPhotos(){
  const out=[];
  allKpis().forEach(({div,disc,kpi})=>(kpi.photos||[]).forEach(p=>out.push({div,disc,kpi,p})));
  return out.sort((a,b)=>a.p.day-b.p.day);
}

/* ---------- Day strip ---------- */
function renderDaystrip(){
  const el=$('#daystrip'); el.innerHTML='';
  const last=lastReportedDay();
  for(let d=0; d<state.meta.days; d++){
    const att = dailyAttainment(allKpis(), d);
    let cls='s-future';
    if(att!=null) cls = att>=95?'s-good':(att>=80?'s-warn':'s-bad');
    const b=document.createElement('button');
    b.className='sleeper '+cls+(d===selectedDay?' active':'');
    b.setAttribute('role','tab');
    b.innerHTML=`<div class="tie"><span class="d">D${d+1}</span><span class="dt">${fmtDow(d)} ${fmtDay(d)}</span></div>
      <div class="pct">${att==null?'—':Math.round(att)+'%'}</div>`;
    b.onclick=()=>{ selectedDay=d; renderAll(); };
    el.appendChild(b);
  }
  $('#dayContext').textContent = `Selected: Day ${selectedDay+1} — ${fmtDow(selectedDay)} ${fmtDay(selectedDay)}`;
}

/* ---------- Overview ---------- */
function renderOverview(){
  const el=$('#tab-overview');
  const items=allKpis();
  const {plan,act}=scopeCurves(items);
  const d = Math.min(selectedDay, state.meta.days-1);
  const last=lastReportedDay();
  const refDay = last>=0? Math.min(d,last) : d;
  const overallA = act[refDay]||0, overallP = plan[refDay]||0;
  const devsToday = deviationList(selectedDay);
  const spi = overallP? (overallA/overallP) : 0;

  let divCards='';
  state.divisions.forEach(dv=>{
    const c=scopeCurves(allKpis(dv.id));
    const a=c.act[refDay]||0, p=c.plan[refDay]||0;
    const st=p? a/p : 0;
    const badge = st>=0.98?'b-good':(st>=0.9?'b-warn':'b-bad');
    const openDevs = deviationList().filter(x=>x.div.id===dv.id).length;
    divCards+=`<div class="card" style="border-top:4px solid ${dv.color};margin-bottom:0">
      <h2 style="margin-bottom:4px">${esc(dv.id)} <span class="hint">${esc(dv.name)}</span></h2>
      <div class="kfig">${a.toFixed(1)}<span style="font-size:18px;color:var(--ink-2)">%</span></div>
      <div class="klab">complete vs ${p.toFixed(1)}% planned to Day ${refDay+1}</div>
      <div class="progress"><i style="width:${Math.min(a,100)}%;background:${dv.color}"></i></div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge ${badge}">${p? Math.round(st*100):0}% of plan</span>
        <span class="badge b-grey">${openDevs} deviation${openDevs===1?'':'s'} logged</span>
      </div></div>`;
  });

  let devRows = devsToday.map(x=>`<tr>
      <td><span class="badge b-grey">${esc(x.div.id)}</span></td>
      <td>${esc(x.kpi.name)}<br><small style="color:var(--ink-2)">${esc(x.disc.name)}</small></td>
      <td><span class="badge b-warn">${esc(x.dev.cat)}</span></td>
      <td>${esc(x.dev.reason)}</td></tr>`).join('');
  if(!devRows) devRows = `<tr><td colspan="4" style="color:var(--ink-2)">No deviations logged for Day ${selectedDay+1}.</td></tr>`;

  el.innerHTML = `
    <div class="grid3" style="margin-bottom:14px">
      <div class="card" style="margin-bottom:0">
        <div class="kfig">${overallA.toFixed(1)}<span style="font-size:18px;color:var(--ink-2)">%</span></div>
        <div class="klab">SHUTDOWN COMPLETE (all divisions, to Day ${refDay+1})</div>
        <div class="progress"><i style="width:${Math.min(overallA,100)}%"></i></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="kfig" style="color:${spi>=0.98?'var(--good)':spi>=0.9?'var(--warn)':'var(--bad)'}">${overallP?spi.toFixed(2):'—'}</div>
        <div class="klab">SCHEDULE PERFORMANCE (actual ÷ plan)</div>
        <div class="note" style="margin-top:8px">${spi>=0.98?'Programme on plan.':spi>=0.9?'Programme marginally behind — recovery within shift capacity.':'Programme behind plan — recovery actions required.'}</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="kfig">${last<0?'—':(last+1)+' / '+state.meta.days}</div>
        <div class="klab">DAYS REPORTED</div>
        <div class="note" style="margin-top:8px">${esc(state.meta.corridor)} · ${fmtDay(0)}–${fmtDay(state.meta.days-1)} 2026</div>
      </div>
    </div>
    <div class="card">
      <h2>Progress against plan <span class="hint">weighted mean of all KPIs — cumulative %</span></h2>
      <div class="chartbox" style="height:300px"><canvas id="ovChart"></canvas></div>
    </div>
    <div class="grid3">${divCards}</div>
    <div class="card" style="margin-top:14px">
      <h2>Deviations — Day ${selectedDay+1} <span class="hint">reasons captured at KPI level in Drill-down</span></h2>
      <div class="tblwrap"><table class="data"><thead><tr><th>OD</th><th>KPI</th><th>Category</th><th>Reason</th></tr></thead><tbody>${devRows}</tbody></table></div>
    </div>`;

  drawOverviewChart(plan, act);
}
let ovChartObj=null;
function drawOverviewChart(plan, act){
  const c=$('#ovChart'); if(!c || typeof Chart==='undefined') return;
  const labels = Array.from({length:state.meta.days},(_,i)=>'D'+(i+1));
  const last=lastReportedDay();
  if(ovChartObj) ovChartObj.destroy();
  ovChartObj = new Chart(c, { type:'line',
    data:{ labels, datasets:[
      { label:'Plan', data:plan, borderColor:'#8FA0B0', borderDash:[6,4], pointRadius:0, tension:.25 },
      { label:'Actual', data:act.map((v,i)=> i<=last? v : null), borderColor:'#00954C', backgroundColor:'rgba(0,149,76,.10)', fill:true, pointRadius:3, tension:.25 },
    ]},
    options:{ maintainAspectRatio:false, scales:{ y:{min:0,max:100,ticks:{callback:v=>v+'%'}} }, plugins:{legend:{position:'bottom'}} }
  });
}

/* ---------- Drill-down ---------- */
function renderDrill(){
  const el=$('#tab-drill');
  let html = `<div class="note" style="margin-bottom:10px">Tap to expand: Operating Division → Discipline → KPI. Enter actuals for <b>Day ${selectedDay+1}</b> (or any day) where you have edit rights. A reason is required whenever an actual falls short of target.</div>`;
  state.divisions.forEach(dv=>{
    const dvCurves=scopeCurves(allKpis(dv.id));
    const last=lastReportedDay(); const ref=last>=0?Math.min(selectedDay,last):selectedDay;
    const a=dvCurves.act[ref]||0;
    const editable = canEdit(dv.id);
    let discs='';
    dv.disciplines.forEach(dc=>{
      const dcCurves=scopeCurves(allKpis(dv.id, dc.id));
      const da=dcCurves.act[ref]||0, dp=dcCurves.plan[ref]||0;
      const st = dp? da/dp : 0;
      const badge = st>=0.98?'b-good':(st>=0.9?'b-warn':'b-bad');
      let kpis='';
      dc.kpis.forEach(k=>{
        const stt=kpiStatus(k,ref);
        const bg = stt==='good'?'b-good':stt==='warn'?'b-warn':stt==='bad'?'b-bad':'b-grey';
        const pct = totT(k)? Math.round(cumA(k,ref)/totT(k)*100):0;
        const open = ui.openKpi.has(k.id);
        kpis += `<div class="kpi ${open?'open':''}" data-kpi="${k.id}">
          <header onclick="toggleKpi('${k.id}')">
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
            <div class="nm">${esc(k.name)}<small>${esc(k.workType)} · ${esc(k.unit)}</small></div>
            <span class="badge b-grey">${pct}% of shutdown scope</span>
            <span class="badge ${bg}">${stt==='grey'?'no data':'vs plan: '+Math.round((cumA(k,ref)/Math.max(cumT(k,ref),0.0001))*100)+'%'}</span>
          </header>
          <div class="kpibody">${open? kpiTable(dv,dc,k,editable):''}</div>
        </div>`;
      });
      const openD = ui.openDisc.has(dc.id);
      discs += `<div class="discipline ${openD?'open':''}">
        <header onclick="toggleDisc('${dc.id}')">
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          <h4>${esc(dc.name)}</h4>
          <span class="badge ${badge}">${da.toFixed(0)}% cum</span>
          <span class="mini">${dc.kpis.length} KPI${dc.kpis.length===1?'':'s'}</span>
        </header>
        <div class="disc-body">${kpis || '<div style="padding:12px 26px;color:var(--ink-2)">No KPIs yet — add one under Setup.</div>'}</div>
      </div>`;
    });
    const openV = ui.openDiv.has(dv.id);
    html += `<div class="division ${openV?'open':''}">
      <header onclick="toggleDiv('${dv.id}')">
        <span class="odtag" style="background:${dv.color}">${esc(dv.id)}</span>
        <h3>${esc(dv.name)}</h3>
        <span class="mini">${a.toFixed(1)}% cum · ${editable? 'EDIT':'VIEW'}</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </header>
      <div class="div-body">${discs}</div>
    </div>`;
  });
  el.innerHTML=html;
}
function kpiTable(dv, dc, k, editable){
  let rows='';
  for(let d=0; d<state.meta.days; d++){
    const t=k.targets[d], a=k.actuals[d];
    const varr = (a==null||t==null)? null : a-t;
    const dev = (k.dev||{})[d];
    const sel = d===selectedDay;
    const needDev = a!=null && t>0 && a<t && !dev;
    rows+=`<tr style="${sel?'background:#FDF4EF':''}">
      <td class="num"><b>D${d+1}</b> <small style="color:var(--ink-2)">${fmtDay(d)}</small></td>
      <td class="num">${t==null?'—':t}</td>
      <td class="num">${editable? `<input type="number" step="any" value="${a==null?'':a}" onchange="setActual('${k.id}',${d},this.value)" aria-label="Actual day ${d+1}">` : (a==null?'—':a)}</td>
      <td class="num" style="color:${varr==null?'inherit':varr<0?'var(--bad)':'var(--good)'}">${varr==null?'—':(varr>0?'+':'')+ (Math.round(varr*100)/100)}</td>
      <td>${dev? `<span class="badge b-warn" title="${esc(dev.reason)}">${esc(dev.cat)}</span>` : needDev? `<span class="badge b-bad">reason required</span>`:''}</td>
    </tr>`;
  }
  const dev = (k.dev||{})[selectedDay];
  const t=k.targets[selectedDay], a=k.actuals[selectedDay];
  const shortToday = a!=null && t>0 && a<t;
  let devBlock='';
  if(dev){
    devBlock=`<div class="devnote"><b>Day ${selectedDay+1} deviation — ${esc(dev.cat)}</b>${esc(dev.reason)}
      ${editable?`<div style="margin-top:6px"><button class="btn sm sec" onclick="clearDev('${k.id}',${selectedDay})">Remove</button></div>`:''}</div>`;
  } else if(editable && shortToday){
    devBlock=`<div class="devform">
      <select id="devcat-${k.id}">${DEV_CATS.map(c=>`<option>${esc(c)}</option>`).join('')}</select>
      <input type="text" id="devtxt-${k.id}" placeholder="Reason for Day ${selectedDay+1} shortfall (what happened, recovery plan)">
      <button class="btn sm" onclick="addDev('${dv.id}','${k.id}',${selectedDay})">Log deviation</button>
    </div>`;
  }
  const photos=(k.photos||[]).filter(p=>p.day===selectedDay);
  let photoBlock = `<div style="margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="note">${photos.length} photo${photos.length===1?'':'s'} for Day ${selectedDay+1} · ${(k.photos||[]).length} total</span>
      ${editable? `<button class="btn sm sec" onclick="startPhoto('${k.id}')">+ Add photo (GPS)</button>`:''}
    </div>`;
  if(photos.length){
    photoBlock += `<div class="photogrid" style="margin-top:8px">`+photos.map((p,i)=>`
      <div class="photocard"><img src="${p.dataUrl}" alt="${esc(p.caption)}">
      <div class="meta"><b>${esc(p.caption||'Site photo')}</b><span class="gps">${p.lat!=null? p.lat.toFixed(5)+', '+p.lon.toFixed(5) : 'no GPS'}</span></div></div>`).join('')+`</div>`;
  }
  return `<div class="tblwrap"><table class="data">
    <thead><tr><th class="num">Day</th><th class="num">Target (${esc(k.unit)})</th><th class="num">Actual</th><th class="num">Var</th><th>Deviation</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td class="num"><b>Total</b></td><td class="num"><b>${Math.round(totT(k)*100)/100}</b></td><td class="num"><b>${Math.round(cumA(k,state.meta.days-1)*100)/100}</b></td><td class="num"></td><td></td></tr></tfoot>
  </table></div>${devBlock}${photoBlock}`;
}

/* drill-down interactions (global for inline handlers) */
window.toggleDiv = id => { ui.openDiv.has(id)? ui.openDiv.delete(id): ui.openDiv.add(id); renderDrill(); };
window.toggleDisc = id => { ui.openDisc.has(id)? ui.openDisc.delete(id): ui.openDisc.add(id); renderDrill(); };
window.toggleKpi = id => { ui.openKpi.has(id)? ui.openKpi.delete(id): ui.openKpi.add(id); renderDrill(); };
function findKpi(id){ let hit=null; allKpis().forEach(x=>{ if(x.kpi.id===id) hit=x; }); return hit; }
window.setActual = async (kid, d, val) => {
  const x=findKpi(kid); if(!x) return;
  if(!canEdit(x.div.id)){ toast('View-only access for '+x.div.id); renderDrill(); return; }
  const value = val===''? null : +val;
  const prev = x.kpi.actuals[d];
  x.kpi.actuals[d] = value; // optimistic
  renderDaystrip(); renderDrill(); if($('#tab-overview').style.display!=='none') renderOverview();
  const { error } = await sb.from('kpi_actuals').upsert({ kpi_id:kid, day:d, value, updated_by: currentUser?.id||null });
  if(error){ x.kpi.actuals[d]=prev; toast('Save failed: '+error.message); renderDaystrip(); renderDrill(); }
};
window.addDev = async (divId, kid, d) => {
  const x=findKpi(kid); if(!x || !canEdit(divId)) return;
  const cat=$('#devcat-'+kid).value, reason=$('#devtxt-'+kid).value.trim();
  if(!reason){ toast('Enter a reason before logging.'); return; }
  const { error } = await sb.from('kpi_deviations').upsert({ kpi_id:kid, day:d, category:cat, reason, updated_by: currentUser?.id||null });
  if(error){ toast('Save failed: '+error.message); return; }
  x.kpi.dev = x.kpi.dev||{}; x.kpi.dev[d]={cat, reason};
  renderDrill(); toast('Deviation logged.');
};
window.clearDev = async (kid, d) => {
  const x=findKpi(kid); if(!x || !canEdit(x.div.id)) return;
  const { error } = await sb.from('kpi_deviations').delete().eq('kpi_id',kid).eq('day',d);
  if(error){ toast('Remove failed: '+error.message); return; }
  delete x.kpi.dev[d]; renderDrill();
};
</script>
<script>
/* =====================================================================
   Part B: photos, charts, weather, setup, sharing, init
   ===================================================================== */
"use strict";

/* ---------- Photo capture with GPS ---------- */
let photoTargetKpi=null;
const photoInput=document.createElement('input');
photoInput.type='file'; photoInput.accept='image/*'; photoInput.capture='environment'; photoInput.style.display='none';
document.body.appendChild(photoInput);
window.startPhoto = kid => { photoTargetKpi=kid; photoInput.value=''; photoInput.click(); };
photoInput.addEventListener('change', ()=>{
  const f=photoInput.files[0]; if(!f || !photoTargetKpi) return;
  const rd=new FileReader();
  rd.onload=()=>{
    // downscale to keep the report light
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');
      const scale=Math.min(1, 1000/img.width);
      cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      const dataUrl=cv.toDataURL('image/jpeg',0.72);
      attachPhoto(dataUrl);
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
});
function attachPhoto(dataUrl){
  const x=findKpi(photoTargetKpi); if(!x) return;
  const caption = prompt('Caption / location description (e.g. "Rail weld km 412, Loop 11")') || 'Site photo';
  const finish=async (lat,lon,src)=>{
    try{
      const blob = await (await fetch(dataUrl)).blob();
      const path = `${photoTargetKpi}/${selectedDay}-${Date.now()}.jpg`;
      const { error: upErr } = await sb.storage.from('kpi-photos').upload(path, blob, { contentType:'image/jpeg' });
      if(upErr) throw upErr;
      const { error: insErr } = await sb.from('kpi_photos').insert({
        kpi_id: photoTargetKpi, day: selectedDay, storage_path: path,
        lat, lon, caption, gps_source: src, created_by: currentUser?.id||null
      });
      if(insErr) throw insErr;
      const { data:pub } = sb.storage.from('kpi-photos').getPublicUrl(path);
      x.kpi.photos = x.kpi.photos||[];
      x.kpi.photos.push({day:selectedDay, dataUrl:pub.publicUrl, lat, lon, caption, ts:new Date().toISOString(), gpsSource:src});
      renderDrill(); toast(lat!=null? 'Photo saved with GPS position.':'Photo saved — no GPS available; add coordinates on the Photos tab if needed.');
    }catch(e){ toast('Photo upload failed: '+e.message); }
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>finish(pos.coords.latitude, pos.coords.longitude, 'device'),
      ()=>finish(null,null,'none'), {enableHighAccuracy:true, timeout:6000});
  } else finish(null,null,'none');
}

/* ---------- Photos tab ---------- */
let photoMap=null, photoLayer=null;
function renderPhotos(){
  const el=$('#tab-photos');
  const photos=allPhotos().filter(x=>
    (!ui.photoDiv || x.div.id===ui.photoDiv) &&
    (ui.photoDay==='' || x.p.day===+ui.photoDay));
  const withGps=photos.filter(x=>x.p.lat!=null);
  el.innerHTML=`<div class="card">
      <h2>Site photos <span class="hint">GPS-linked evidence of executed work</span></h2>
      <div class="frow" style="margin-bottom:12px">
        <label>Division<select id="phDiv"><option value="">All</option>${state.divisions.map(d=>`<option value="${d.id}" ${ui.photoDiv===d.id?'selected':''}>${d.id}</option>`).join('')}</select></label>
        <label>Day<select id="phDay"><option value="">All</option>${Array.from({length:state.meta.days},(_,i)=>`<option value="${i}" ${ui.photoDay===String(i)?'selected':''}>Day ${i+1} — ${fmtDay(i)}</option>`).join('')}</select></label>
        <span class="note">${photos.length} photo(s) · ${withGps.length} with GPS. Photos are added per KPI in the Drill-down tab.</span>
      </div>
      <div id="photomap"></div>
      <div id="mapFallback" class="note" style="display:none;margin-top:6px">Map tiles could not load in this environment — coordinates remain attached to every photo below.</div>
    </div>
    <div class="card"><div class="photogrid">${
      photos.length? photos.map(x=>`<div class="photocard">
        <img src="${x.p.dataUrl}" alt="${esc(x.p.caption)}">
        <div class="meta"><b>${esc(x.p.caption)}</b>
          ${esc(x.div.id)} · ${esc(x.kpi.name)} · Day ${x.p.day+1}<br>
          <span class="gps">${x.p.lat!=null? x.p.lat.toFixed(5)+', '+x.p.lon.toFixed(5):'no GPS'}</span>
        </div></div>`).join('') : '<span class="note">No photos match the current filter.</span>'
    }</div></div>`;
  $('#phDiv').onchange=e=>{ ui.photoDiv=e.target.value; renderPhotos(); };
  $('#phDay').onchange=e=>{ ui.photoDay=e.target.value; renderPhotos(); };
  // map
  try{
    if(typeof L==='undefined') throw new Error('leaflet unavailable');
    photoMap=L.map('photomap',{scrollWheelZoom:false}).setView([-30.6,19.5],6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:17, attribution:'© OpenStreetMap'}).addTo(photoMap);
    const line=[[-27.7846,22.9843],[-28.55,21.9],[-29.2,20.4],[-29.66,19.5],[-30.55,18.03],[-31.55,18.25],[-32.35,18.32],[-33.0117,17.9442]];
    L.polyline(line,{color:'#00954C',weight:3,opacity:.7,dashArray:'6 6'}).addTo(photoMap);
    photoLayer=L.layerGroup().addTo(photoMap);
    withGps.forEach(x=>{
      L.circleMarker([x.p.lat,x.p.lon],{radius:8,color:x.div.color,fillColor:x.div.color,fillOpacity:.85})
       .bindPopup(`<b>${esc(x.p.caption)}</b><br>${esc(x.div.id)} · ${esc(x.kpi.name)}<br>Day ${x.p.day+1} · ${x.p.lat.toFixed(5)}, ${x.p.lon.toFixed(5)}<br><img src="${x.p.dataUrl}" style="width:180px;margin-top:6px;border-radius:4px">`)
       .addTo(photoLayer);
    });
    if(withGps.length){ photoMap.fitBounds(withGps.map(x=>[x.p.lat,x.p.lon]),{padding:[40,40],maxZoom:11}); }
    setTimeout(()=>photoMap.invalidateSize(),80);
  }catch(e){ const m=$('#photomap'); if(m) m.style.display='none'; const f=$('#mapFallback'); if(f) f.style.display='block'; }
}

/* ---------- Charts tab ---------- */
let mainChartObj=null, divChartObj=null;
function chartScopeOptions(){
  const opts=[{v:'ALL', t:'Overall shutdown'}];
  state.divisions.forEach(dv=>{
    opts.push({v:'DIV:'+dv.id, t:dv.id+' — division'});
    dv.disciplines.forEach(dc=>{
      opts.push({v:'DISC:'+dc.id, t:'· '+dv.id+' / '+dc.name});
      dc.kpis.forEach(k=>opts.push({v:'KPI:'+k.id, t:'·· '+k.name+' ('+k.unit+')'}));
    });
  });
  return opts;
}
function scopeItems(v){
  if(!v || v==='ALL') return {items:allKpis(), label:'Overall', unit:'%'};
  const [kind,id]=v.split(':');
  if(kind==='DIV'){ const dv=state.divisions.find(d=>d.id===id); return {items:allKpis(id), label:id, unit:'%'}; }
  if(kind==='DISC'){ let hit; state.divisions.forEach(dv=>dv.disciplines.forEach(dc=>{ if(dc.id===id) hit={dv,dc}; }));
    return hit? {items:allKpis(hit.dv.id,hit.dc.id), label:hit.dc.name, unit:'%'} : {items:[],label:'?',unit:'%'}; }
  if(kind==='KPI'){ const x=findKpi(id); return x? {items:[x], label:x.kpi.name, unit:x.kpi.unit, kpi:x.kpi}:{items:[],label:'?',unit:'%'}; }
  return {items:[],label:'?',unit:'%'};
}
function renderCharts(){
  const sc=$('#cScope'), cp=$('#cCompare');
  const opts=chartScopeOptions();
  sc.innerHTML = opts.map(o=>`<option value="${o.v}" ${state.charts.scope===o.v?'selected':''}>${esc(o.t)}</option>`).join('');
  cp.innerHTML = '<option value="">— none —</option>'+opts.map(o=>`<option value="${o.v}" ${state.charts.compare===o.v?'selected':''}>${esc(o.t)}</option>`).join('');
  $('#cSeries').value = state.charts.series;
  drawMainChart(); drawDivChart();
}
function drawMainChart(){
  if(typeof Chart==='undefined') return;
  const c=$('#mainChart'); if(!c) return;
  const labels=Array.from({length:state.meta.days},(_,i)=>'D'+(i+1)+' '+fmtDay(i));
  const s=scopeItems(state.charts.scope);
  const last=lastReportedDay();
  const datasets=[]; let yTitle='%'; let type='line'; let maxY=undefined;
  const series=state.charts.series;
  if(s.kpi && series!=='cum'){ /* single KPI daily views in native units */
    const k=s.kpi; yTitle=k.unit; type='bar';
    if(series==='daily'){
      datasets.push({label:'Target', data:k.targets, backgroundColor:'#B9C4CE'});
      datasets.push({label:'Actual', data:k.actuals.map((v,i)=>i<=last?v:null), backgroundColor:'#00954C'});
    } else { // variance
      datasets.push({label:'Variance (actual − target)', data:k.actuals.map((v,i)=> v==null?null:v-k.targets[i]),
        backgroundColor:k.actuals.map((v,i)=> v==null?'#ccc':(v-k.targets[i]>=0?'#1E7D46':'#B3261E'))});
    }
  } else if(s.kpi && series==='cum'){
    const k=s.kpi; yTitle=k.unit;
    datasets.push({label:'Plan (cum)', data:labels.map((_,d)=>cumT(k,d)), borderColor:'#8FA0B0', borderDash:[6,4], pointRadius:0, tension:.2});
    datasets.push({label:'Actual (cum)', data:labels.map((_,d)=> d<=last? cumA(k,d):null), borderColor:'#00954C', pointRadius:3, tension:.2});
  } else {
    const cv=scopeCurves(s.items); maxY=100;
    if(series==='cum'){
      datasets.push({label:s.label+' — plan', data:cv.plan, borderColor:'#8FA0B0', borderDash:[6,4], pointRadius:0, tension:.2});
      datasets.push({label:s.label+' — actual', data:cv.act.map((v,i)=>i<=last?v:null), borderColor:'#00954C', pointRadius:3, tension:.2});
    } else if(series==='daily'){
      type='bar';
      datasets.push({label:s.label+' — daily attainment %', data:labels.map((_,d)=>dailyAttainment(s.items,d)), backgroundColor:'#00954C'});
      maxY=130;
    } else {
      type='bar';
      datasets.push({label:s.label+' — daily attainment vs 100%', data:labels.map((_,d)=>{const a=dailyAttainment(s.items,d); return a==null?null:a-100;}),
        backgroundColor:labels.map((_,d)=>{const a=dailyAttainment(s.items,d); return a==null?'#ccc':(a>=100?'#1E7D46':'#B3261E');})});
    }
  }
  if(state.charts.compare){
    const s2=scopeItems(state.charts.compare);
    const cv2=scopeCurves(s2.items);
    datasets.push({label:s2.label+' — actual (%)', data:cv2.act.map((v,i)=>i<=last?v:null), borderColor:'#0F766E', pointRadius:0, borderDash:[2,3], tension:.2, type:'line', yAxisID: yTitle==='%'?'y':'y2'});
  }
  if(mainChartObj) mainChartObj.destroy();
  const scales={ y:{ title:{display:true,text:yTitle}, min: state.charts.series==='var'? undefined:0, max:maxY } };
  if(state.charts.compare && yTitle!=='%') scales.y2={position:'right', min:0, max:100, title:{display:true,text:'%'}, grid:{drawOnChartArea:false}};
  mainChartObj=new Chart(c,{type, data:{labels,datasets}, options:{maintainAspectRatio:false, scales, plugins:{legend:{position:'bottom'}}}});
}
function drawDivChart(){
  if(typeof Chart==='undefined') return;
  const c=$('#divChart'); if(!c) return;
  const labels=Array.from({length:state.meta.days},(_,i)=>'D'+(i+1));
  if(divChartObj) divChartObj.destroy();
  divChartObj=new Chart(c,{type:'bar',
    data:{labels, datasets: state.divisions.map(dv=>({label:dv.id, backgroundColor:dv.color,
      data: labels.map((_,d)=>dailyAttainment(allKpis(dv.id),d)) }))},
    options:{maintainAspectRatio:false, scales:{y:{min:0,max:130,title:{display:true,text:'Daily attainment %'}}}, plugins:{legend:{position:'bottom'}}}});
}

/* ---------- Setup / admin ---------- */
function renderSetup(){
  const el=$('#tab-setup');
  if(!isAdmin()){
    el.innerHTML=`<div class="card"><h2>Setup</h2><div class="note">Configuration is restricted to the Programme Admin role. Your current role (${esc(role.name)}) has ${role.edit.length? 'edit rights for '+role.edit.join(', '):'view-only access'}.</div></div>`;
    return;
  }
  const discOptions = dv => dv.disciplines.map(dc=>`<option value="${dc.id}">${esc(dc.name)}</option>`).join('');
  let kpiRows='';
  allKpis().forEach(({div,disc,kpi})=>{
    kpiRows+=`<tr><td><span class="badge b-grey">${div.id}</span></td><td>${esc(disc.name)}</td><td>${esc(kpi.name)}<br><small style="color:var(--ink-2)">${esc(kpi.workType)} · ${esc(kpi.unit)}</small></td>
      <td class="num">${Math.round(totT(kpi)*100)/100}</td>
      <td><button class="btn sm sec" onclick="editTargets('${kpi.id}')">Targets</button>
          <button class="btn sm danger" onclick="delKpi('${kpi.id}')">Delete</button></td></tr>`;
  });
  el.innerHTML=`
  <div class="card">
    <h2>Add a KPI <span class="hint">discipline owners define the work type, metric and target per day</span></h2>
    <div class="frow">
      <label>Division<select id="nkDiv">${state.divisions.map(d=>`<option value="${d.id}">${d.id}</option>`).join('')}</select></label>
      <label>Discipline<select id="nkDisc">${discOptions(state.divisions[0])}</select></label>
      <label>KPI name<input id="nkName" placeholder="e.g. Rail replacement"></label>
      <label>Work type<select id="nkType"><option>Renewal</option><option>Maintenance</option><option>Rehabilitation</option><option>Inspection</option><option>Construction</option></select></label>
      <label>Unit<input id="nkUnit" placeholder="km / no. / tasks" style="min-width:90px"></label>
    </div>
    <div class="frow">
      <label>Daily target (uniform)<input id="nkTarget" type="number" step="any" placeholder="e.g. 3.6" style="min-width:90px"></label>
      <span class="note">or set per-day:</span>
      <div class="targetrow">${Array.from({length:10},(_,i)=>`<input type="number" step="any" id="nkT${i}" placeholder="D${i+1}">`).join('')}</div>
      <button class="btn" onclick="addKpi()">Add KPI</button>
    </div>
  </div>
  <div class="card">
    <h2>Add a discipline</h2>
    <div class="frow">
      <label>Division<select id="ndDiv">${state.divisions.map(d=>`<option value="${d.id}">${d.id}</option>`).join('')}</select></label>
      <label>Discipline name<input id="ndName" placeholder="e.g. Depot Infrastructure"></label>
      <button class="btn" onclick="addDisc()">Add discipline</button>
    </div>
  </div>
  <div class="card">
    <h2>KPI register</h2>
    <div class="tblwrap"><table class="data"><thead><tr><th>OD</th><th>Discipline</th><th>KPI</th><th class="num">Total target</th><th></th></tr></thead><tbody>${kpiRows}</tbody></table></div>
  </div>
  <div class="card">
    <h2>Access model <span class="hint">enforced server-side by Supabase Row Level Security, keyed off each signed-in user's profile role</span></h2>
    <div class="tblwrap"><table class="data accessgrid"><thead><tr><th>Role</th><th>TRIM</th><th>TE</th><th>TPT</th><th>Setup</th></tr></thead><tbody>
    ${ROLES.map(r=>`<tr><td>${esc(r.name)}</td>${['TRIM','TE','TPT'].map(d=>`<td><span class="pill ${r.edit.includes(d)?'edit':'view'}">${r.edit.includes(d)?'edit':'view'}</span></td>`).join('')}<td><span class="pill ${r.setup?'edit':'none'}">${r.setup?'yes':'no'}</span></td></tr>`).join('')}
    </tbody></table></div>
  </div>
  <div class="card">
    <h2>Report settings</h2>
    <div class="frow">
      <label>Shutdown name<input id="mName" value="${esc(state.meta.name)}" style="min-width:260px"></label>
      <label>Start date<input id="mStart" type="date" value="${state.meta.startDate}"></label>
      <button class="btn sec" onclick="saveMeta()">Save settings</button>
      ${state.meta.demo? `<button class="btn danger" onclick="clearDemo()">Clear demo actuals & photos</button>`:''}
    </div>
    <div class="note">Sharing: everyone viewing this page reads the same live Supabase-backed data — nothing to export/import. Use Export (top bar) only if you want a one-off JSON snapshot. To invite a new editor, see <a href="supabase/README.md">supabase/README.md</a>.</div>
  </div>`;
  $('#nkDiv').onchange=e=>{ const dv=state.divisions.find(d=>d.id===e.target.value); $('#nkDisc').innerHTML=discOptions(dv); };
}
window.addKpi=async ()=>{
  const dv=state.divisions.find(d=>d.id===$('#nkDiv').value);
  const dc=dv.disciplines.find(x=>x.id===$('#nkDisc').value);
  const name=$('#nkName').value.trim(); if(!name){ toast('Give the KPI a name.'); return; }
  const unit=$('#nkUnit').value.trim()||'no.';
  const uniform=parseFloat($('#nkTarget').value);
  const targets=Array.from({length:state.meta.days},(_,i)=>{
    const v=parseFloat($('#nkT'+i).value);
    return isNaN(v)? (isNaN(uniform)?0:uniform) : v;
  });
  const { error } = await sb.from('kpis').insert({ discipline_id:dc.id, name, work_type:$('#nkType').value, unit, targets, sort_order: dc.kpis.length+1 });
  if(error){ toast('Add failed: '+error.message); return; }
  state = await fetchState(); renderSetup(); renderDrill(); toast('KPI added to '+dv.id+' / '+dc.name+'.');
};
window.addDisc=async ()=>{
  const dv=state.divisions.find(d=>d.id===$('#ndDiv').value);
  const name=$('#ndName').value.trim(); if(!name){ toast('Give the discipline a name.'); return; }
  const { error } = await sb.from('disciplines').insert({ division_id:dv.id, name, sort_order: dv.disciplines.length+1 });
  if(error){ toast('Add failed: '+error.message); return; }
  state = await fetchState(); renderSetup(); renderDrill(); toast('Discipline added.');
};
window.delKpi=async id=>{
  if(!confirm('Delete this KPI and all its data?')) return;
  const { error } = await sb.from('kpis').delete().eq('id', id);
  if(error){ toast('Delete failed: '+error.message); return; }
  state = await fetchState(); renderSetup(); renderDrill();
};
window.editTargets=async id=>{
  const x=findKpi(id); if(!x) return;
  const cur=x.kpi.targets.join(', ');
  const v=prompt('Targets per day ('+state.meta.days+' comma-separated values) for "'+x.kpi.name+'"', cur);
  if(v==null) return;
  const arr=v.split(',').map(s=>parseFloat(s.trim())||0);
  const targets=arr.concat(Array(state.meta.days).fill(0)).slice(0,state.meta.days);
  const { error } = await sb.from('kpis').update({ targets }).eq('id', id);
  if(error){ toast('Update failed: '+error.message); return; }
  x.kpi.targets=targets; renderSetup(); renderDrill(); toast('Targets updated.');
};
window.saveMeta=async ()=>{
  const name=$('#mName').value.trim()||state.meta.name;
  const startDate=$('#mStart').value||state.meta.startDate;
  const { error } = await sb.from('report_meta').update({ name, start_date:startDate, updated_by: currentUser?.id||null }).eq('id',1);
  if(error){ toast('Save failed: '+error.message); return; }
  state.meta.name=name; state.meta.startDate=startDate;
  renderAll(); toast('Settings saved.');
};
window.clearDemo=async ()=>{
  if(!confirm('Clear all actuals, deviations and photos? Targets and KPI structure are kept.')) return;
  const kpiIds = allKpis().map(({kpi})=>kpi.id);
  const { error:e1 } = await sb.from('kpi_actuals').delete().in('kpi_id', kpiIds);
  const { error:e2 } = await sb.from('kpi_deviations').delete().in('kpi_id', kpiIds);
  const { error:e3 } = await sb.from('kpi_photos').delete().in('kpi_id', kpiIds);
  const { error:e4 } = await sb.from('report_meta').update({ demo:false }).eq('id',1);
  const err = e1||e2||e3||e4;
  if(err){ toast('Clear failed: '+err.message); return; }
  selectedDay=0;
  state = await fetchState(); renderAll(); toast('Demo data cleared — ready for live reporting.');
};

/* ---------- Export ---------- */
$('#btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ore-line-shutdown-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
};

/* ---------- Auth ---------- */
function renderRole(){
  const chip=$('#roleChip');
  chip.textContent = role.edit.length? (role.setup? 'Edit all + setup':'Edit: '+role.edit.join(', ')) : 'View only';
  chip.className='rolechip'+(role.edit.length?'':' viewonly');
}
function renderAuthArea(){
  const el=$('#authArea'); if(!el) return;
  if(!sb){ el.innerHTML=''; return; }
  if(currentUser){
    el.innerHTML = `<span class="authchip">${esc(currentUser.email)}</span><button class="btn-ghost" id="btnSignOut">Sign out</button>`;
    $('#btnSignOut').onclick = async ()=>{ await sb.auth.signOut(); };
  } else {
    el.innerHTML = `<button class="btn-ghost" id="btnSignIn">Sign in</button>`;
    $('#btnSignIn').onclick = ()=>{ $('#loginBackdrop').style.display='flex'; $('#loginEmail').focus(); };
  }
}
$('#btnCancelLogin').onclick=()=>{ $('#loginBackdrop').style.display='none'; $('#loginError').textContent=''; };
$('#btnDoLogin').onclick=async ()=>{
  const email=$('#loginEmail').value.trim(), password=$('#loginPassword').value;
  if(!email || !password){ $('#loginError').textContent='Enter both email and password.'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $('#loginError').textContent=error.message; return; }
  $('#loginBackdrop').style.display='none';
  $('#loginEmail').value=''; $('#loginPassword').value=''; $('#loginError').textContent='';
};
if(sb){
  sb.auth.onAuthStateChange(async (_event, session)=>{
    currentUser = session?.user || null;
    if(currentUser){
      const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = data || null;
    } else currentProfile = null;
    role = roleFromProfile(currentProfile);
    renderAuthArea(); renderAll();
  });
}

/* ---------- Tabs ---------- */

const TAB_NAMES=['overview','drill','charts','photos','setup'];
function tabFromHash(){
  const h=(location.hash||'').replace('#','');
  return TAB_NAMES.includes(h) ? h : 'overview';
}
let activeTab=tabFromHash();
function applyActiveTab(){
  $$('#tabs button').forEach(x=>x.classList.toggle('active',x.dataset.tab===activeTab));
  $$('main > section').forEach(s=>s.style.display = s.id==='tab-'+activeTab? 'block':'none');
}
function renderActiveTab(){
  if(activeTab==='overview') renderOverview();
  if(activeTab==='drill') renderDrill();
  if(activeTab==='charts') renderCharts();
  if(activeTab==='photos') renderPhotos();
  if(activeTab==='setup') renderSetup();
}
$('#tabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  activeTab=b.dataset.tab;
  history.replaceState(null,'','#'+activeTab);
  applyActiveTab();
  renderActiveTab();
});
window.addEventListener('hashchange',()=>{ activeTab=tabFromHash(); applyActiveTab(); renderActiveTab(); });
['cScope','cSeries','cCompare'].forEach(id=>{
  document.addEventListener('change',e=>{
    if(e.target.id!==id) return;
    state.charts[{cScope:'scope',cSeries:'series',cCompare:'compare'}[id]]=e.target.value;
    drawMainChart();
  });
});

/* ---------- Realtime — keep all clients in sync ---------- */
let realtimeChannel=null, remoteRefreshTimer=null;
function subscribeRealtime(){
  if(!sb || realtimeChannel) return;
  realtimeChannel = sb.channel('report-changes');
  ['kpi_actuals','kpi_deviations','kpi_photos','kpis','disciplines','report_meta'].forEach(table=>{
    realtimeChannel.on('postgres_changes', {event:'*', schema:'public', table}, ()=>{
      clearTimeout(remoteRefreshTimer);
      remoteRefreshTimer = setTimeout(async ()=>{
        try{ state = await fetchState(); renderAll(); }catch(e){ /* transient — next change retries */ }
      }, 350);
    });
  });
  realtimeChannel.subscribe();
}

/* ---------- Boot ---------- */
function renderAll(){
  renderRole(); renderAuthArea(); renderDaystrip(); applyActiveTab();
  $('#subTitle').textContent = (state.meta.corridor||'').toUpperCase()+' · '+state.meta.days+'-DAY POSSESSION';
  renderActiveTab();
  $('#foot').innerHTML = `Live shutdown reporting for TRIM / TE / TPT and mine customers, backed by Supabase — edits save immediately and sync to everyone viewing the report. Weather risk reporting for the corridor lives on its own <a href="weather.html">WeatherWatch page</a>. See <a href="supabase/README.md">supabase/README.md</a> to invite editors.`;
}
function showSetupNeeded(msg){
  const note=$('#offlineNote');
  note.style.display='block'; note.textContent=msg;
  renderAuthArea();
  $('#foot').innerHTML = 'Backend not connected — see <a href="supabase/README.md">supabase/README.md</a> for setup steps.';
}
(async function init(){
  if(!sb){
    showSetupNeeded('Supabase is not configured yet — paste your Project URL and anon key into the SUPABASE_URL / SUPABASE_ANON_KEY constants near the top of the script, then run supabase/schema.sql in the SQL Editor.');
    return;
  }
  try{
    await refreshAuth();
    state = await fetchState();
  }catch(e){
    showSetupNeeded('Could not reach Supabase (' + e.message + '). Check SUPABASE_URL/SUPABASE_ANON_KEY and that supabase/schema.sql has been run.');
    return;
  }
  renderAll();
  subscribeRealtime();
})();
</script>
</body>
